<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMOSHIROI JAPAN - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 450px; margin-top: 5rem;">
        <div class="card text-center">
            <h1 class="brand justify-center" style="font-size: 2rem; margin-bottom: 0.5rem;">🌸 OMOSHIROI</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">JLPT Online Test Platform</p>
            
            <form id="loginForm" class="flex-col">
                <div class="form-group">
                    <label class="form-label" for="username">Name (ローマ字)</label>
                    <input type="text" id="username" class="form-control" placeholder="Taro Yamada" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password Key</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <div id="loginError" class="hidden" style="color: var(--danger-color); font-size: 0.85rem; margin-bottom: 1rem; background: #f8dbdf; padding: 0.5rem; border-radius: 4px;">
                    Invalid credentials. Continuing as guest session.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">START SESSION</button>
            </form>
            
            <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                If your account is not registered, a temporary session will be created automatically.
            </p>
        </div>
    </div>

    <!-- Script included as module -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
