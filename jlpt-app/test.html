<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination - OMOSHIROI JAPAN</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="user-select: none;">
    <header>
        <div class="container flex items-center justify-between" style="padding: 0.5rem 1.5rem;">
            <div class="brand"><img src="assets/images/logo.png" alt="Logo" style="height: 30px; margin-right: 0.5rem;"> OMOSHIROI <span id="testLevelBadge" class="badge" style="background: var(--sakura-accent); color: var(--primary-color);">N5</span></div>
            <button id="forceSubmitBtn" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Submit Exam</button>
        </div>
    </header>

    <main class="container">
        <!-- Persistent Timer -->
        <div class="text-center">
            <div class="timer-container" id="timerDisplay">--:--:--</div>
        </div>

        <!-- Progress bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>
        <div class="text-center mb-2" style="font-size: 0.85rem; color: var(--text-secondary);">
            Question <span id="progressText">0 / 0</span>
        </div>

        <div id="questionsContainer" class="card mb-2">
            <!-- Questions rendered via JS -->
            <div class="text-center" style="padding: 3rem;">
                <p style="color: var(--text-secondary);">Loading Questions...</p>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2">
            <button id="prevBtn" class="btn btn-outline" disabled>← Previous</button>
            <button id="nextBtn" class="btn btn-primary">Next →</button>
        </div>
    </main>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/anti-cheat.js"></script>
    <script src="assets/js/test.js"></script>
</body>
</html>
