<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMOSHIROI JAPAN - Masuk</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="alternate" hreflang="id" href="login_id.html">
    <link rel="alternate" hreflang="en" href="login_en.html">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 450px; margin-top: 5rem;">
        <div class="card text-center">
            <h1 class="brand justify-center" style="font-size: 2rem; margin-bottom: 0.5rem;"><img src="assets/images/logo.png" alt="Logo" style="height: 40px; margin-right: 0.5rem;"> OMOSHIROI</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Platform Tes JLPT Online</p>

            <form id="loginForm" class="flex-col">
                <div class="form-group">
                    <label class="form-label" for="username">Nama (ローマ字)</label>
                    <input type="text" id="username" class="form-control" placeholder="Contoh: Taro Yamada" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Kata Sandi Ujian</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan kata sandi">
                </div>

                <div id="loginError" class="hidden" style="color: var(--danger-color); font-size: 0.85rem; margin-bottom: 1rem; background: #f8dbdf; padding: 0.5rem; border-radius: 4px;">
                    Akun tidak ditemukan. Sesi tamu sementara dibuat otomatis.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">MULAI SESI</button>
            </form>

            <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                Jika akun Anda belum terdaftar, sesi tamu sementara akan dibuat secara otomatis.
            </p>

            <div style="margin-top: 1rem;">
                <a href="login_en.html" onclick="localStorage.setItem('lang','en')" style="font-size:0.8rem;color:var(--text-secondary);">Switch to English</a>
            </div>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script>
        // Override redirect targets for language-aware auth
        window.__loginSuccessTarget = 'dashboard_id.html';
    </script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
