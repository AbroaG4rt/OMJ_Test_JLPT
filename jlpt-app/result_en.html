<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="alternate" hreflang="id" href="result_id.html">
    <link rel="alternate" hreflang="en" href="result_en.html">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>
    <header>
        <div class="container flex items-center justify-between" style="padding: 0.5rem 1.5rem;">
            <a href="dashboard_en.html" class="brand"><img src="assets/images/logo.png" alt="Logo" style="height: 30px; margin-right: 0.5rem;"> OMOSHIROI</a>
            <nav class="nav-links">
                <a href="dashboard_en.html">Return to Dashboard</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="text-center mb-2">
            <h1>Examination Results (<span id="levelDisplay">N5</span>)</h1>
            <div id="badgeDisplay" class="badge mt-1" style="font-size: 1rem; padding: 0.5rem 1rem;">Testing</div>
            <p id="motivationalQuote" class="mt-1" style="font-style: italic; color: var(--text-secondary);"></p>
        </div>

        <div class="flex flex-col items-center mb-2">
            <div class="card" style="width: 100%; max-width: 500px; margin-bottom: 2rem;">
                <div class="text-center mb-1">
                    <h2 id="scoreDisplay" style="font-size: 3rem; color: var(--primary-color);">0%</h2>
                    <p id="fractionDisplay">0 / 0 Correct</p>
                </div>
                <div style="position: relative; height: 250px; width: 100%;">
                    <canvas id="resultChart"></canvas>
                </div>
            </div>

            <div class="card" style="width: 100%; max-width: 500px; border-left: 4px solid var(--danger-color);">
                <h3 style="margin-bottom: 1rem;">Security & Behavioral Report</h3>
                <div class="flex justify-between items-center mb-1">
                    <span style="font-weight: 500;">Cheating Risk Score:</span>
                    <span id="cheatScoreBadge" class="badge">Evaluating...</span>
                </div>
                <ul id="cheatStatsList" style="list-style: none; font-size: 0.9rem; color: var(--text-secondary);">
                </ul>
            </div>
        </div>

        <div class="flex justify-center flex-wrap" style="gap: 1rem; margin-bottom: 2rem;">
            <button id="downloadPdfBtn" class="btn btn-outline">📥 Download PDF Report</button>
            <button id="shareTestBtn" class="btn btn-outline">📷 Share Test (QR)</button>
            <button id="emailFormToggleBtn" class="btn btn-primary">📧 Send to Email</button>
        </div>

        <div id="emailFormContainer" class="card hidden mb-2" style="max-width: 500px; margin: 0 auto 2rem;">
            <h3>Submit Results via Worker API</h3>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">This triggers an HTTP POST request to the Cloudflare Worker.</p>
            <form id="emailSubmitForm">
                <div class="form-group">
                    <label class="form-label" for="targetEmail">Verification Email Address</label>
                    <input type="email" id="targetEmail" class="form-control" value="ofc.omj.japan@gmail.com" readonly>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Execute API Call</button>
            </form>
        </div>

        <div id="qrContainerWrapper" class="card hidden text-center mb-2" style="max-width: 350px; margin: 0 auto;">
            <h3>Share this test</h3>
            <div id="qrcode" style="margin: 1.5rem auto; display: flex; justify-content: center;"></div>
            <button id="downloadQrBtn" class="btn btn-outline" style="font-size: 0.85rem;">Download QR Image</button>
        </div>
    </main>
